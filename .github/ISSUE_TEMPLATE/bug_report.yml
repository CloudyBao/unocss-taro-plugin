name: Bug report
description: Report a reproducible bug
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal reproduction steps
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Node, pnpm, Taro, UnoCSS versions
    validations:
      required: true
